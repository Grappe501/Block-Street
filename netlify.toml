[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
  # Production (Netlify UI):
  #   AUTH_SESSION_SECRET — required for signed cookies
  #   AUTH_BOOTSTRAP_PASSWORD — Steve/admin password (default Forevermost if unset)
  # Auth + identity-trust writes use Netlify Blobs when NETLIFY runtime is detected.

